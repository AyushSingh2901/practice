name: practice

on:
  push:
    branches:
      - main

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: install dependencies
        run: npm install

      - name: docker build image
        run: docker build -t ${{ secrets.docker_user }}/practice_image:v1 .

  docker-push:

    steps:
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_user }}
          password: ${{ secrets.docker_password }}

      - name: docker push image
        run: docker push ${{ secrets.docker_user }}/practice_image:v1     